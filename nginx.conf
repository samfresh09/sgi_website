server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/manifest+json image/svg+xml font/woff2;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- Hashed build assets: cache forever ----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Long cache for static media / fonts ----
    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- SEO files: always fresh ----
    location = /sitemap.xml { add_header Cache-Control "no-cache"; }
    location = /robots.txt  { add_header Cache-Control "no-cache"; }

    # ---- HTML documents: revalidate so updates show immediately ----
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ---- Routes: serve nested index.html, clean URLs (no trailing slash) ----
    location / {
        try_files $uri $uri/ =404;
    }

    # ---- Branded 404 page (real 404 status) ----
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "no-cache";
    }
}
