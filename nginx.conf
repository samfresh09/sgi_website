server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/manifest+json image/svg+xml font/woff2;

    # ---- Default headers (HTML docs, robots, sitemap, manifest…) ----
    # Documents revalidate so updates show immediately; security headers on every doc.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Cache-Control "no-cache" always;

    # ---- Hashed build assets: cache forever (own add_header overrides defaults) ----
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- Static media / fonts: long cache ----
    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ---- Home ----
    location = / {
        try_files /index.html =404;
    }

    # ---- Routes: serve the nested index.html directly, clean URLs, NO 301 ----
    location / {
        try_files $uri $uri/index.html =404;
    }

    # ---- Branded 404 page (served with a real 404 status) ----
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
